<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/></marker>
  </defs>

  <rect x="30" y="30" width="900" height="260" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="50" y="58" font-size="15" fill="#1e3a8a">Runtime plane (serves every request)</text>

  <rect x="60" y="90" width="100" height="44" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="110" y="117" font-size="15" fill="#334155" text-anchor="middle">Chat</text>
  <rect x="60" y="160" width="100" height="44" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="110" y="187" font-size="15" fill="#334155" text-anchor="middle">Email</text>

  <rect x="210" y="120" width="140" height="56" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="280" y="143" font-size="15" fill="#1e3a8a" text-anchor="middle">Session service</text>
  <text x="280" y="163" font-size="12" fill="#3b82f6" text-anchor="middle">identity, history</text>

  <rect x="400" y="120" width="120" height="56" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="460" y="143" font-size="15" fill="#92400e" text-anchor="middle">Guardrails</text>
  <text x="460" y="163" font-size="12" fill="#b45309" text-anchor="middle">in + out</text>

  <rect x="570" y="90" width="170" height="120" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="655" y="118" font-size="16" fill="#1e3a8a" text-anchor="middle">Agent core</text>
  <text x="655" y="140" font-size="12" fill="#3b82f6" text-anchor="middle">loop + model router</text>
  <text x="655" y="158" font-size="12" fill="#3b82f6" text-anchor="middle">tools · RAG · memory</text>
  <text x="655" y="176" font-size="12" fill="#3b82f6" text-anchor="middle">autonomy tiers</text>

  <rect x="780" y="120" width="130" height="56" rx="6" fill="#fef2f2" stroke="#dc2626"/>
  <text x="845" y="143" font-size="15" fill="#991b1b" text-anchor="middle">Human console</text>
  <text x="845" y="163" font-size="12" fill="#b91c1c" text-anchor="middle">handoff package</text>

  <line x1="160" y1="112" x2="208" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="160" y1="182" x2="208" y2="158" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="350" y1="148" x2="398" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="520" y1="148" x2="568" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="740" y1="148" x2="778" y2="148" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="774" y="136" font-size="12" fill="#b91c1c" text-anchor="end">escalate</text>

  <rect x="570" y="230" width="170" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-dasharray="5 3"/>
  <text x="655" y="257" font-size="13" fill="#134e4a" text-anchor="middle">extraction job → memory</text>
  <line x1="655" y1="210" x2="655" y2="228" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ag)"/>

  <rect x="30" y="330" width="900" height="200" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="6 4"/>
  <text x="50" y="358" font-size="15" fill="#64748b">Control plane (decides what's allowed to ship)</text>

  <rect x="60" y="390" width="150" height="60" rx="6" fill="#fafafa" stroke="#94a3b8"/>
  <text x="135" y="415" font-size="15" fill="#334155" text-anchor="middle">Trace store</text>
  <text x="135" y="435" font-size="12" fill="#64748b" text-anchor="middle">every turn, replayable</text>

  <rect x="280" y="390" width="180" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="370" y="415" font-size="15" fill="#1e3a8a" text-anchor="middle">Eval suite + judge</text>
  <text x="370" y="435" font-size="12" fill="#3b82f6" text-anchor="middle">grows from failures</text>

  <rect x="530" y="390" width="130" height="60" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="595" y="415" font-size="15" fill="#134e4a" text-anchor="middle">Gates</text>
  <text x="595" y="435" font-size="12" fill="#0f766e" text-anchor="middle">per-dimension</text>

  <rect x="730" y="390" width="180" height="60" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="820" y="415" font-size="15" fill="#92400e" text-anchor="middle">Canary + ramp</text>
  <text x="820" y="435" font-size="12" fill="#b45309" text-anchor="middle">config-flip rollback</text>

  <line x1="210" y1="420" x2="278" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="460" y1="420" x2="528" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="660" y1="420" x2="728" y2="420" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="360" y1="290" x2="150" y2="388" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ad)"/>
  <text x="180" y="330" font-size="12" fill="#94a3b8">traces flow down</text>

  <line x1="845" y1="176" x2="845" y2="240 " stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3"/>
  <path d="M 845 240 L 845 310 L 400 310 L 385 388" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ad)"/>
  <text x="560" y="302" font-size="12" fill="#b91c1c">human corrections label the suite</text>

  <path d="M 820 388 L 820 340 L 890 340 L 890 294" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <text x="880" y="322" font-size="12" fill="#0f766e" text-anchor="end">approved config ships up</text>
</svg>
