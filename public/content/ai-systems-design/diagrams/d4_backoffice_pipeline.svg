  <text x="390" y="268" font-size="16" fill="#92400e" text-anchor="middle">Human review queues</text>
  <text x="390" y="290" font-size="13" fill="#b45309" text-anchor="middle">confidence-routed exceptions, purpose-built UI</text>

  <line x1="240" y1="124" x2="260" y2="238" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#am)"/>
  <line x1="410" y1="124" x2="390" y2="238" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#am)"/>
  <line x1="595" y1="124" x2="530" y2="238" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#am)"/>
  <text x="470" y="180" font-size="13" fill="#b45309">low confidence or failed checks</text>

  <line x1="480" y1="240" x2="700" y2="130" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ag)"/>
