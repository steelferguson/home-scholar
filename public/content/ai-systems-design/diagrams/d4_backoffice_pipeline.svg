  <rect x="680" y="240" width="240" height="70" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="800" y="268" font-size="16" fill="#134e4a" text-anchor="middle">Corrections flywheel</text>
  <text x="800" y="290" font-size="13" fill="#0f766e" text-anchor="middle">labels feed evals + thresholds</text>
  <line x1="600" y1="290" x2="678" y2="285" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="900" y1="124" x2="850" y2="238" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a)"/>

  <rect x="30" y="380" width="910" height="60" rx="6" fill="#fafafa" stroke="#94a3b8" stroke-dasharray="6 4"/>
  <text x="485" y="405" font-size="15" fill="#334155" text-anchor="middle">Audit trail (compliance record, multi-year retention)</text>
  <text x="485" y="427" font-size="13" fill="#64748b" text-anchor="middle">doc version · extraction values · model + prompt versions · validations run · who approved · when executed</text>

  <text x="485" y="480" font-size="14" fill="#64748b" text-anchor="middle">Autonomy ratchet: launch in shadow mode, measure per-field accuracy, raise straight-through thresholds per task type</text>
</svg>
