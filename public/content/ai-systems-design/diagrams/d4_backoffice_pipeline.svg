<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
    <marker id="am" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#d97706"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/></marker>
  </defs>

  <rect x="30" y="60" width="110" height="64" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="85" y="86" font-size="16" fill="#334155" text-anchor="middle">Intake</text>
  <text x="85" y="106" font-size="12" fill="#64748b" text-anchor="middle">docs, feeds</text>

  <rect x="180" y="60" width="120" height="64" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="240" y="86" font-size="16" fill="#1e3a8a" text-anchor="middle">Classify</text>
  <text x="240" y="106" font-size="12" fill="#3b82f6" text-anchor="middle">doc type</text>

  <rect x="340" y="60" width="140" height="64" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="410" y="86" font-size="16" fill="#1e3a8a" text-anchor="middle">Extract</text>
  <text x="410" y="106" font-size="12" fill="#3b82f6" text-anchor="middle">per-field confidence</text>

  <rect x="520" y="60" width="150" height="64" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="595" y="86" font-size="16" fill="#134e4a" text-anchor="middle">Validate</text>
  <text x="595" y="106" font-size="12" fill="#0f766e" text-anchor="middle">reconcile + rules</text>

  <rect x="710" y="60" width="120" height="64" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="770" y="86" font-size="16" fill="#92400e" text-anchor="middle">Execute</text>
  <text x="770" y="106" font-size="12" fill="#b45309" text-anchor="middle">idempotent</text>

  <rect x="860" y="60" width="80" height="64" rx="6" fill="#fafafa" stroke="#94a3b8" stroke-dasharray="5 3"/>
  <text x="900" y="86" font-size="14" fill="#64748b" text-anchor="middle">QA</text>
  <text x="900" y="104" font-size="12" fill="#94a3b8" text-anchor="middle">sample</text>

  <line x1="140" y1="92" x2="178" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="300" y1="92" x2="338" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="480" y1="92" x2="518" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="670" y1="92" x2="708" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="830" y1="92" x2="858" y2="92" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
