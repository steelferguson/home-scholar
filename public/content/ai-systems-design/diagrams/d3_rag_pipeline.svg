<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/></marker>
  </defs>

  <rect x="30" y="30" width="900" height="150" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="6 4"/>
  <text x="50" y="56" font-size="14" fill="#64748b">Ingestion (offline, on every doc change)</text>

  <rect x="60" y="85" width="130" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="125" y="111" font-size="16" fill="#334155" text-anchor="middle">Documents</text>
  <text x="125" y="131" font-size="12" fill="#64748b" text-anchor="middle">docs, policies, wikis</text>

  <rect x="250" y="85" width="170" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="335" y="111" font-size="16" fill="#1e3a8a" text-anchor="middle">Chunk + metadata</text>
  <text x="335" y="131" font-size="12" fill="#3b82f6" text-anchor="middle">structure-aware, tagged</text>

  <rect x="480" y="85" width="120" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="540" y="121" font-size="16" fill="#1e3a8a" text-anchor="middle">Embed</text>

  <rect x="680" y="80" width="180" height="70" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="770" y="107" font-size="16" fill="#134e4a" text-anchor="middle">Index</text>
  <text x="770" y="127" font-size="12" fill="#0f766e" text-anchor="middle">vectors + keywords</text>
  <text x="770" y="142" font-size="12" fill="#0f766e" text-anchor="middle">+ metadata filters</text>

  <line x1="190" y1="115" x2="248" y2="115" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="420" y1="115" x2="478" y2="115" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="600" y1="115" x2="678" y2="115" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="230" width="900" height="180" rx="8" fill="none" stroke="#3b82f6"/>
  <text x="50" y="256" font-size="14" fill="#1e3a8a">Query (online, latency path)</text>

  <rect x="60" y="290" width="120" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="120" y="316" font-size="16" fill="#334155" text-anchor="middle">Question</text>
  <text x="120" y="336" font-size="12" fill="#64748b" text-anchor="middle">+ history</text>

  <rect x="230" y="290" width="150" height="60" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="305" y="316" font-size="16" fill="#134e4a" text-anchor="middle">Rewrite</text>
  <text x="305" y="336" font-size="12" fill="#0f766e" text-anchor="middle">small model, standalone</text>

  <rect x="430" y="290" width="160" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="510" y="316" font-size="16" fill="#1e3a8a" text-anchor="middle">Hybrid search</text>
  <text x="510" y="336" font-size="12" fill="#3b82f6" text-anchor="middle">dense + BM25, filtered</text>

  <rect x="640" y="290" width="120" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="700" y="316" font-size="16" fill="#1e3a8a" text-anchor="middle">Rerank</text>
  <text x="700" y="336" font-size="12" fill="#3b82f6" text-anchor="middle">top 30 to top 5</text>

  <rect x="810" y="290" width="120" height="60" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="870" y="311" font-size="15" fill="#92400e" text-anchor="middle">Generate</text>
  <text x="870" y="329" font-size="12" fill="#b45309" text-anchor="middle">grounded,</text>
  <text x="870" y="343" font-size="12" fill="#b45309" text-anchor="middle">cited</text>

  <line x1="180" y1="320" x2="228" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="380" y1="320" x2="428" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="590" y1="320" x2="638" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="760" y1="320" x2="808" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <line x1="510" y1="288" x2="740" y2="152" stroke="#0d9488" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="600" y="222" font-size="13" fill="#0f766e">queries the index</text>

  <rect x="600" y="440" width="220" height="56" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="5 3"/>
  <text x="710" y="463" font-size="15" fill="#991b1b" text-anchor="middle">Abstain / handoff</text>
  <text x="710" y="482" font-size="12" fill="#b91c1c" text-anchor="middle">"I don't have that" beats a guess</text>
  <line x1="700" y1="350" x2="705" y2="438" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ar)"/>
  <text x="770" y="395" font-size="12" fill="#b91c1c">weak results</text>
</svg>
