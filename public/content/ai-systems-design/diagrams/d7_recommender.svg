<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#64748b"/></marker>
    <marker id="ad" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#0d9488"/></marker>
  </defs>

  <rect x="30" y="40" width="900" height="200" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="6 4"/>
  <text x="50" y="68" font-size="15" fill="#64748b">Offline (batch: hours to daily)</text>

  <rect x="60" y="100" width="150" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="135" y="125" font-size="15" fill="#334155" text-anchor="middle">Interaction logs</text>
  <text x="135" y="145" font-size="12" fill="#64748b" text-anchor="middle">impressions, clicks</text>

  <rect x="280" y="100" width="180" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="370" y="125" font-size="15" fill="#1e3a8a" text-anchor="middle">Training pipeline</text>
  <text x="370" y="145" font-size="12" fill="#3b82f6" text-anchor="middle">implicit labels, neg sampling</text>

  <rect x="530" y="100" width="150" height="60" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="605" y="125" font-size="15" fill="#134e4a" text-anchor="middle">Model registry</text>
  <text x="605" y="145" font-size="12" fill="#0f766e" text-anchor="middle">versioned, gated</text>

  <rect x="720" y="100" width="185" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="812" y="125" font-size="15" fill="#1e3a8a" text-anchor="middle">Embedding + index build</text>
  <text x="812" y="145" font-size="12" fill="#3b82f6" text-anchor="middle">user + item vectors</text>

  <line x1="210" y1="130" x2="278" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="460" y1="130" x2="528" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M 135 160 L 135 200 L 812 200 L 812 162" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="30" y="280" width="900" height="250" rx="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="50" y="308" font-size="15" fill="#1e3a8a">Online (per request: budget ~100-200ms)</text>

  <rect x="60" y="340" width="130" height="60" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="125" y="365" font-size="15" fill="#334155" text-anchor="middle">User request</text>
  <text x="125" y="385" font-size="12" fill="#64748b" text-anchor="middle">context</text>

  <rect x="240" y="340" width="180" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="330" y="365" font-size="15" fill="#1e3a8a" text-anchor="middle">Candidate generation</text>
  <text x="330" y="385" font-size="12" fill="#3b82f6" text-anchor="middle">ANN + recents + trending</text>

  <rect x="470" y="340" width="150" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="545" y="365" font-size="15" fill="#1e3a8a" text-anchor="middle">Ranker</text>
  <text x="545" y="385" font-size="12" fill="#3b82f6" text-anchor="middle">CTR model, ~500 items</text>

  <rect x="670" y="340" width="170" height="60" rx="6" fill="#fffbeb" stroke="#d97706"/>
  <text x="755" y="365" font-size="15" fill="#92400e" text-anchor="middle">Business re-rank</text>
  <text x="755" y="385" font-size="12" fill="#b45309" text-anchor="middle">diversity, freshness, policy</text>

  <line x1="190" y1="370" x2="238" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="420" y1="370" x2="468" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="444" y="358" font-size="11" fill="#64748b" text-anchor="middle">~500</text>
  <line x1="620" y1="370" x2="668" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="644" y="358" font-size="11" fill="#64748b" text-anchor="middle">~50</text>

  <rect x="240" y="450" width="180" height="50" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="330" y="471" font-size="14" fill="#134e4a" text-anchor="middle">ANN index</text>
  <text x="330" y="489" font-size="12" fill="#0f766e" text-anchor="middle">millions of items</text>
  <line x1="330" y1="448" x2="330" y2="402" stroke="#0d9488" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="470" y="450" width="150" height="50" rx="6" fill="#f0fdfa" stroke="#0d9488"/>
  <text x="545" y="471" font-size="14" fill="#134e4a" text-anchor="middle">Feature store</text>
  <text x="545" y="489" font-size="12" fill="#0f766e" text-anchor="middle">same values as training</text>
  <line x1="545" y1="448" x2="545" y2="402" stroke="#0d9488" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="690" y="450" width="130" height="50" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="755" y="481" font-size="15" fill="#334155" text-anchor="middle">Serve feed</text>
  <line x1="755" y1="400" x2="755" y2="448" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>

  <path d="M 755 500 L 755 518 L 45 518 L 45 130 L 58 130" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#ad)"/>
  <text x="380" y="548" font-size="13" fill="#64748b">impressions + clicks flow back to the logs: the loop that trains tomorrow's model</text>

  <path d="M 605 160 L 605 260 L 570 260 L 570 338" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <text x="612" y="262" font-size="12" fill="#0f766e">deploy ranker</text>

  <path d="M 905 130 L 918 130 L 918 508 L 330 508 L 330 502" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ad)"/>
  <text x="905" y="330" font-size="12" fill="#3b82f6" text-anchor="end">index rebuilt offline</text>
</svg>
